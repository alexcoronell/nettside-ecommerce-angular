<div class="flex flex-col items-center gap-y-3 md:relative md:flex-row md:justify-center">
  <p class="text-sm opacity-70 md:absolute md:top-1/2 md:left-0 md:-translate-y-1/2">
    Total: {{ total() }}
  </p>
  <div class="flex gap-3">
    <button (click)="firstPage.emit()" [disabled]="!hasPreviousPage()">
      <svg [lucideIcon]="lucideChevronFirst" class="text-white/80"></svg>
    </button>
    <button (click)="previousPage.emit()" [disabled]="!hasPreviousPage()">
      <svg [lucideIcon]="lucideChevronLeft" class="text-white/80"></svg>
    </button>
    <input type="text" value="{{ page() }}" readonly class="text-center" style="width: 60px" />
    <button (click)="nextPage.emit()" [disabled]="!hasNextPage()">
      <svg [lucideIcon]="lucideChevronRight" class="text-white/80"></svg>
    </button>
    <button (click)="lastPage.emit()" [disabled]="!hasNextPage()">
      <svg [lucideIcon]="lucideChevronLast" class="text-white/80"></svg>
    </button>
  </div>
  <p class="text-sm opacity-70 md:absolute md:top-1/2 md:right-0 md:-translate-y-1/2">
    {{ showing() }}
  </p>
</div>
