<div class="form-group">
  <div class="mt-1 flex items-center gap-2">
    <input
      [id]="id()"
      type="checkbox"
      [formField]="field()"
      [attr.aria-describedby]="isInvalid() ? id() + '-error' : null"
      [attr.aria-invalid]="isInvalid() || null"
      class="text-primary focus:ring-primary h-4 w-4 rounded border-gray-300"
    />
    <label [for]="id()">
      {{ label() }}
    </label>
  </div>

  @if (isInvalid()) {
    @for (error of errors(); track error.message) {
      <p
        [id]="id() + '-error'"
        role="alert"
        class="absolute top-auto bottom-1 left-0 text-xs text-red-400"
      >
        {{ error.message }}
      </p>
    }
  }
</div>
