@if (showConfirm$()) {
  <div
    class="bg-primary/50 dark:bg-dark-background/50 fixed inset-0 flex items-center justify-center backdrop-blur-sm"
  >
    <div class="bg-background dark:bg-primary-hover rounded-lg p-6 shadow-lg">
      <h2 class="mb-4 text-lg font-semibold">Confirm Delete</h2>
      <p class="mb-4">{{ message$() }}</p>
      <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-light" (click)="cancel()">Cancel</button>
        <button type="button" class="btn btn-danger" (click)="confirm()">Delete</button>
      </div>
    </div>
  </div>
}
