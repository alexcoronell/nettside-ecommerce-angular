<div class="flex flex-row items-center gap-4">
  @if (!user()) {
    <button class="btn btn-link" routerLink="/login">Login</button>
    <button class="btn btn-link" routerLink="/registration">Register</button>
  } @else {
    <svg [lucideIcon]="lucideUser" class="h-12 w-12"></svg>
    <p class="mb-0 text-sm text-nowrap">Hello, {{ user()?.firstname }}</p>
    <button class="btn btn-link" (click)="logout()">Logout</button>
  }
</div>
