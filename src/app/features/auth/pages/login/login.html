<div class="flex h-full w-screen flex-col justify-center px-6 py-3 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <h2 class="mt-3 text-center text-2xl/9 tracking-tight">Sign in to your account</h2>
  </div>

  <div class="mt-6 sm:mx-auto sm:w-full sm:max-w-sm">
    <form class="space-y-3">
      <div>
        <label for="email" class="block text-sm/6 font-medium">Email address</label>
        <div class="mt-1">
          <input
            id="email"
            type="email"
            name="email"
            required
            autocomplete="email"
            class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6"
          />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="password" class="block text-sm/6 font-medium">Password</label>
          <div class="text-sm">
            <a href="#" class="text-primary hover:text-primary-hover font-semibold"
              >Forgot password?</a
            >
          </div>
        </div>
        <div class="mt-1">
          <input
            id="password"
            type="password"
            name="password"
            required
            autocomplete="current-password"
            class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6"
          />
        </div>
      </div>

      <div class="pt-6">
        <button type="submit" class="btn btn-primary">Sign in</button>
      </div>
    </form>

    <p class="text-dark-text/40 mt-10 text-center text-sm/6">
      Don't have an account?
      <a routerLink="/registration" class="text-primary hover:text-primary-hover font-semibold"
        >Register here</a
      >
    </p>
  </div>
</div>
