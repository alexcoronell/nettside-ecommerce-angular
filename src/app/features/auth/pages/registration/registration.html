<div
  class="flex h-full w-screen flex-col justify-center px-6 py-12 md:py-32 lg:px-8 lg:py-6 2xl:py-16"
>
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <h2 class="mt-3 text-center text-2xl/9 font-bold tracking-tight">Create an account</h2>
  </div>

  <div class="mt-6 sm:mx-auto sm:w-full sm:max-w-sm">
    <form class="space-y-3">
      <div>
        <label for="name" class="block text-sm/6 font-medium">Fullname</label>
        <div class="mt-2">
          <input
            id="name"
            type="text"
            name="name"
            required
            autocomplete="name"
            class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6"
          />
        </div>
      </div>

      <div>
        <label for="email" class="block text-sm/6 font-medium">Email address</label>
        <div class="mt-2">
          <input
            id="email"
            type="email"
            name="email"
            required
            autocomplete="email"
            class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6"
          />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="password" class="block text-sm/6 font-medium">Password</label>
          <div class="text-sm">
            <a href="#" class="text-primary hover:text-primary-hover font-semibold"
              >Forgot password?</a
            >
          </div>
        </div>
        <div class="mt-2">
          <input
            id="password"
            type="password"
            name="password"
            required
            autocomplete="current-password"
            class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6"
          />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="confirm-password" class="block text-sm/6 font-medium">Confirm Password</label>
        </div>
        <div class="mt-2">
          <input
            id="confirm-password"
            type="password"
            name="confirm-password"
            required
            autocomplete="confirm-password"
            class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6"
          />
        </div>
      </div>

      <div class="pt-6">
        <button type="submit" class="btn btn-primary">Register</button>
      </div>
    </form>

    <p class="text-dark-text/40 dark:text-light-text/40 mt-10 text-center text-sm/6">
      Already have an account?
      <a routerLink="/login" class="text-primary hover:text-primary-hover font-semibold"
        >Login here</a
      >
    </p>
  </div>
</div>
