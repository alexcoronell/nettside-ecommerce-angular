<div class="AdminForm max-w-[400px] px-6">
  <h1>{{ title() }}</h1>
  <div class="AdminForm__container">
    <form (submit)="onSubmit($event)" novalidate>
      <fieldset [disabled]="isLoading()" class="contents">
        <div class="mb-6">
          <app-input
            id="name"
            label="Name"
            type="text"
            autocomplete="name"
            placeholder="Nike"
            [field]="brandForm.name"
          />
          <app-input-file
            id="logo"
            label="Logo"
            [field]="brandForm.logo"
            [(filename)]="fileName"
            [formIsReadonly]="formIsReadonly()"
          />
        </div>
        <app-admin-form-buttons
          [statusForm]="statusForm()"
          [isLoading]="isLoading()"
          (onEdit)="onEdit()"
          (onCancel)="onCancel()"
        />
      </fieldset>
    </form>
  </div>
</div>
